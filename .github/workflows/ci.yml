name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancel previous runs on the same branch when a new commit comes in
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ───── Backend ─────
  server:
    name: Server (lint + test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./server

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check (src + tests)
        run: npm run lint

      - name: Run tests
        env:
          # Tests inject their own env vars; this satisfies any safety check.
          OXR_APP_ID: ci-placeholder-app-id
        run: npm test

      - name: Build (type-check only — runtime uses tsx)
        run: npm run build

  # ───── Frontend ─────
  client:
    name: Client (lint + test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./client

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build (local)
        run: npm run build:local

      - name: Build (preprod)
        run: npm run build:preprod

      - name: Build (prod)
        run: npm run build:prod
